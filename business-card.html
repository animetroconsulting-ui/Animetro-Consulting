<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Animetro Business Card</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@600;700&family=Montserrat:wght@400;500;600;700&family=Noto+Sans+TC:wght@400;500;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="assets/business-card/business-card.css">
  </head>
  <body>
    <main class="sheet" aria-label="Animetro business card design">
      <section class="card card-front" aria-label="Business card front">
        <div class="front-mark">
          <img src="assets/business-card/animetro-crest-transparent.png" alt="Animetro crest logo">
        </div>
        <div class="front-content">
          <div class="gold-line"></div>
          <p class="kicker">Animetro Consulting</p>
          <h1>ANIMETRO</h1>
          <p class="subtitle">Animetro Consulting</p>
          <p class="slogan">Education Beyond Admission</p>
        </div>
      </section>

      <section class="card card-back" aria-label="Business card back">
        <img class="watermark" src="assets/business-card/animetro-crest-transparent.png" alt="">
        <div class="back-left">
          <p class="brand-small">ANIMETRO</p>
          <div class="gold-line"></div>
          <h2>Emily Huang</h2>
          <p class="role">Founder &amp; Education Strategist</p>
          <dl class="contact-list">
            <div>
              <dt>Email</dt>
              <dd>consulting@animetro.ca</dd>
            </div>
            <div>
              <dt>Web</dt>
              <dd>www.animetro.ca</dd>
            </div>
            <div>
              <dt>Phone</dt>
              <dd>905-955-7068</dd>
            </div>
          </dl>
        </div>
        <div class="back-right" aria-label="QR code placeholders">
          <div class="qr-card">
            <div class="qr-placeholder" aria-hidden="true">
              <span></span><span></span><span></span>
            </div>
            <p>WeChat</p>
          </div>
          <div class="qr-card">
            <div class="qr-placeholder" aria-hidden="true">
              <span></span><span></span><span></span>
            </div>
            <p>WhatsApp</p>
          </div>
        </div>
      </section>
    </main>
  </body>
</html>
