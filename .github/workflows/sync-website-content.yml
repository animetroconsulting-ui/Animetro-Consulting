name: Sync website content from Google Sheet

on:
  workflow_dispatch:
  schedule:
    - cron: "0 13 * * *"

permissions:
  contents: write

jobs:
  sync-website-content:
    name: Sync and commit website content
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements.txt

      - name: Export Google Sheet and sync website files
        env:
          GOOGLE_SHEET_ID: ${{ secrets.GOOGLE_SHEET_ID }}
          GOOGLE_SERVICE_ACCOUNT_JSON: ${{ secrets.GOOGLE_SERVICE_ACCOUNT_JSON }}
          GOOGLE_DRIVE_FOLDER_ID: ${{ secrets.GOOGLE_DRIVE_FOLDER_ID }}
          GOOGLE_SHEET_TAB_NAME: ${{ vars.GOOGLE_SHEET_TAB_NAME || 'Website Copy' }}
        run: python scripts/sync_website_content.py

      - name: Commit synced website content
        run: |
          if git diff --quiet; then
            echo "No website content changes to commit."
            exit 0
          fi

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add content/website-content.csv en zh
          git commit -m "Sync website content from Google Sheet" \
            -m "Page Updated: Website" \
            -m "Section Updated: Google Sheet content sync" \
            -m "Change Type: Content sync" \
            -m "Before:" \
            -m "After: Latest approved Google Sheet content" \
            -m "Reason: Keep website content aligned with approved source sheet." \
            -m "Notes: Automated sync from content/website-content.csv."
          git push
