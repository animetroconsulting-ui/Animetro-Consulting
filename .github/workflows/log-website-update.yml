name: Log confirmed website update

on:
  push:
    branches:
      - main
  workflow_dispatch:
    inputs:
      mode:
        description: "Append a safe test row."
        required: true
        default: test-row
        type: choice
        options:
          - test-row
          - test-codex-change-log

permissions:
  contents: read
  pull-requests: read
  id-token: write

jobs:
  log-website-update:
    name: Append update log row
    runs-on: ubuntu-latest
    if: github.event_name == 'workflow_dispatch' || github.ref == 'refs/heads/main'

    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 2

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.GOOGLE_WORKLOAD_IDENTITY_PROVIDER }}
          service_account: animetro-sheet-logger@hardy-abode-499712-e7.iam.gserviceaccount.com

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Google Sheets dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install google-api-python-client google-auth

      - name: Append safe test row
        if: github.event_name == 'workflow_dispatch' && inputs.mode == 'test-row'
        env:
          GOOGLE_SHEET_ID: 1MjWHgypp0SItMQI6AHiUoTAqTzhe8pyeFVUblcnSDTg
          WEBSITE_UPDATE_LOG_TAB_NAME: ${{ vars.WEBSITE_UPDATE_LOG_TAB_NAME || 'Animetro Website Update Log' }}
        run: python scripts/log_website_update.py --mode test-row

      - name: Append safe Codex change log test row
        if: github.event_name == 'workflow_dispatch' && inputs.mode == 'test-codex-change-log'
        env:
          GOOGLE_SHEET_ID: 1MjWHgypp0SItMQI6AHiUoTAqTzhe8pyeFVUblcnSDTg
          CODEX_CHANGE_LOG_TAB_NAME: ${{ vars.CODEX_CHANGE_LOG_TAB_NAME || 'Codex Change Log' }}
          CODEX_CHANGE_LOG_MODE: test
        run: python scripts/log_codex_change_log.py

      - name: Append confirmed main update row
        if: github.event_name == 'push'
        env:
          GOOGLE_SHEET_ID: 1MjWHgypp0SItMQI6AHiUoTAqTzhe8pyeFVUblcnSDTg
          WEBSITE_UPDATE_LOG_TAB_NAME: ${{ vars.WEBSITE_UPDATE_LOG_TAB_NAME || 'Animetro Website Update Log' }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: python scripts/log_website_update.py --mode push

      - name: Append direct content changes for review
        if: github.event_name == 'push'
        env:
          GOOGLE_SHEET_ID: 1MjWHgypp0SItMQI6AHiUoTAqTzhe8pyeFVUblcnSDTg
          CODEX_CHANGE_LOG_TAB_NAME: ${{ vars.CODEX_CHANGE_LOG_TAB_NAME || 'Codex Change Log' }}
        run: python scripts/log_codex_change_log.py
